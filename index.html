<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetShop Amigo Fiel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="logo"><img src="img/logo-transparente.png"
         alt="logotipo do petshop amigo fiel" width="100" /></div>

         <button id="menu-btn">☰</button>
         <nav id="menu">
          <a href="#home">home</a>
          <a href="#servicos">serviços</a>
          <a href="#galeria">galeria</a>
          <a href="#hcontato">contato</a>
          <a href="#localizacao">localizacao</a>
         </nav>
    </header>

    <!-- HERO -->
    <section id="home" class="hero"><div class="hero-content">
      <h1>cuidando do seu melhor amigo</h1>
      <p>banho, tosa, veterinario e muito carinho.</p>
      <a href="#contato" class="btn">agendar agora</a>
    </div></section>

    <!-- SERVIÇOS -->
    <section id="servicos" class="container">
      <h2>nossos servicos</h2>

      <div class="cards">
      <div class="card">
        <img src="img/banho.png" alt="servico de tosa" />
        <h3>banho</h3>
        <p>banho profissional para seu pet.</p>
      </div>

      <div class="card">
        <img src="img/tosa.png" alt="servico de tosa" />
        <h3>tosa</h3>
        <p>tosa profissional para seu pet.</p>
      </div>

      <div class="card">
        <img src="img/veterinario.png" alt="servico de veterinario" />
        <h3>veterinario</h3>
        <p>veterinario profissional para seu pet.</p>
      </div>
      
    </section>

    <!-- GALERIA -->
    <section id="galeria" class="container"></section>

    <!-- CONTATO -->
    <section id="contato" class="container"></section>

    <!-- MAPA -->
    <section id="localizacao" class="container"></section>

    <!-- FOOTER -->
    <footer></footer>

    <script src="js/script.js"></script>
  </body>
</html>
